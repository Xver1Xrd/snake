<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeEcho Snake</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: monospace;
        }
        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
        }
        .loading {
            color: #32dc5a;
            font-size: 24px;
            text-align: center;
        }
        .loading span {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <style>
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        canvas { display: block; }
    </style>
    <canvas id="canvas"></canvas>
    <div class="loading" id="loading"><span>Loading TimeEcho Snake...</span></div>
    <script>
        (function() {
            var el = document.getElementById('loading');
            var interval = setInterval(function() {
                var c = document.getElementById('canvas');
                if (c && c.width > 0 && c.height > 0) {
                    if (el) { el.style.display = 'none'; el.parentNode.removeChild(el); }
                    clearInterval(interval);
                }
            }, 100);
        })();
    </script>
    {{{ SCRIPT }}}
</body>
</html>
